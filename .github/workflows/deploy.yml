name: Build and Deploy to GitHub Pages

# Auto-deploys the production bundle to gh-pages on every push to main.
# Without this, `npm run build` runs locally but never reaches the public site
# unless someone remembers to run `npm run deploy` — which is exactly the
# trap that wasted multiple debugging cycles.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # Provide your Supabase credentials as repo secrets so the build
          # has them at compile time (Vite inlines VITE_* envs).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          # [skip ci] tells Vercel (and any other CI watching gh-pages)
          # to not trigger a build on this commit. gh-pages contains only
          # the pre-built dist/ output — no Vite, no package.json — so a
          # downstream Vercel build would always fail with "vite: command
          # not found".
          commit_message: '[skip ci] deploy: ${{ github.event.head_commit.message }}'
